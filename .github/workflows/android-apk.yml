name: Build OnDuty APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Force compileSdk/targetSdk 34 if gradle file exists
        run: |
          FILE="android/app/build.gradle"
          if [ -f "$FILE" ]; then
            sed -i 's/compileSdkVersion [0-9]\+/compileSdkVersion 34/g' "$FILE" || true
            sed -i 's/targetSdkVersion [0-9]\+/targetSdkVersion 34/g' "$FILE" || true
            sed -i 's/compileSdk [0-9]\+/compileSdk 34/g' "$FILE" || true
            sed -i 's/targetSdk [0-9]\+/targetSdk 34/g' "$FILE" || true
          fi

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OnDuty-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
